name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: ./.github/actions/setup-tap

      - name: Style
        run: brew style Casks/ Formula/

      # Offline audit only. `--new`/`--online` download and Gatekeeper-assess
      # the apps, which always fails for the unsigned Eclipse/Qt bundles
      # ("the software has been altered"), so they are intentionally omitted.
      - name: Audit casks
        run: brew audit --cask eventb-rossi/tap/rodin eventb-rossi/tap/rodin@rc eventb-rossi/tap/atelier-b

      - name: Audit formulae
        run: brew audit --formula eventb-rossi/tap/evbt eventb-rossi/tap/tlc4b eventb-rossi/tap/b2program
