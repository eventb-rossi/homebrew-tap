name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: ./.github/actions/setup-tap

      - name: Style
        run: brew style Casks/ Formula/

      # Audit the whole tap by name rather than a hand-maintained list, so every
      # formula and cask is covered automatically — a hardcoded list silently
      # left out eventb-checker. Offline only: `--new`/`--online` download and
      # Gatekeeper-assess the unsigned Eclipse/Qt bundles ("the software has been
      # altered"), which always fails. Style is handled by the step above (audit
      # skips style checks when no formula/cask is named).
      - name: Audit
        run: brew audit --tap=eventb-rossi/tap
