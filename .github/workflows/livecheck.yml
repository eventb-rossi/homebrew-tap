name: Release tracker

on:
  schedule:
    - cron: "17 7 * * *"   # daily, 07:17 UTC (safety net + third-party upstreams)
  workflow_dispatch: {}
  # An eventb-rossi upstream tool just released: scan now instead of waiting for
  # tomorrow's cron (dispatched by eventb-rossi/release-automation).
  repository_dispatch:
    types: [upstream-release]

concurrency:
  group: release-tracker
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  # GitHub-sourced formulae have version-derivable URLs, so the version + sha256
  # bump is mechanical: open update PRs via Homebrew's official action.
  bump-formulae:
    runs-on: ubuntu-latest
    # brew bump-formula-pr commits the version bump; brew takes the git
    # author/committer identity from these (the runner has none configured).
    env:
      HOMEBREW_GIT_NAME: github-actions[bot]
      HOMEBREW_GIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    steps:
      - uses: actions/checkout@v7
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          # bump-formula-pr runs `brew audit`, which must resolve the formulae's
          # homebrew/core dependencies (openjdk*). The Linux runner has no core
          # tap and its API-based resolution failed there ("Can't find dependency
          # 'openjdk@21'"), so clone the core tap explicitly.
          core: true
      - uses: ./.github/actions/setup-tap

      # Build the formula list from the tap contents instead of a hand-maintained
      # list (a hardcoded one silently dropped formulae before — see ci.yml).
      # bump-packages expects the names space-separated on ONE line: it parses the
      # input with `read -a`, which stops at the first newline, so a YAML block
      # list silently checked only the first formula. b2program needs no
      # exclusion: its livecheck is `skip`-ed upstream and `brew bump` skips it
      # gracefully.
      - name: List formulae
        id: formulae
        run: |
          names=$(for f in Formula/*.rb; do
            printf 'eventb-rossi/tap/%s ' "$(basename "$f" .rb)"
          done)
          echo "list=${names% }" >> "$GITHUB_OUTPUT"

      - name: Open PRs for outdated formulae
        uses: Homebrew/actions/bump-packages@master
        with:
          # Default GITHUB_TOKEN can't push branches / open PRs that re-trigger CI,
          # and brew bump needs write access. Uses the org secret VERSION_BUMP_TOKEN
          # (a PAT with Contents + Pull requests: write), shared across the
          # eventb-rossi packaging repos.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fork: false            # we own the tap; push the bump branch directly
          formulae: ${{ steps.formulae.outputs.list }}

  # Casks embed opaque build ids in their download URLs (timestamp + git hash), so
  # they can't be auto-bumped — file a tracking issue per new release instead.
  track-casks:
    runs-on: macos-latest        # Linux Homebrew cannot livecheck casks
    steps:
      - uses: actions/checkout@v7
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: ./.github/actions/setup-tap

      - name: File issues for outdated casks
        env:
          GH_TOKEN: ${{ github.token }}   # issue create/update only; no org PAT needed
        run: |
          set -euo pipefail

          # Scan every cask in the tap (no hardcoded list to keep in sync as the tap
          # grows). livecheck exits non-zero if a source is unreachable; don't abort
          # the whole job — parse whatever JSON it produced.
          brew livecheck --tap eventb-rossi/tap --cask --newer-only --json > casks.json || true

          # Idempotent label.
          gh label create livecheck \
            --color FBCA04 \
            --description "Upstream release detected by brew livecheck" 2>/dev/null || true

          # Snapshot of open tracking issues, taken before we create any.
          existing="$(gh issue list --label livecheck --state open --json number,title --limit 200)"

          # name<TAB>current<TAB>latest for each genuinely-newer cask (strip the
          # tap prefix that --tap puts on the cask token).
          jq -r '.[]
                 | select(.version.latest != null and .version.current != .version.latest)
                 | [(.cask | sub("^.*/"; "")), .version.current, .version.latest]
                 | @tsv' casks.json |
          while IFS=$'\t' read -r name current latest; do
            title="${name}: ${current} → ${latest}"

            if jq -e --arg t "$title" 'any(.[]; .title == $t)' <<<"$existing" >/dev/null; then
              echo "Already tracked: $title"
              continue
            fi

            body="$(cat <<EOF
          \`brew livecheck\` found a newer upstream release for the **${name}** cask.

          | | Version |
          |---|---|
          | Packaged | \`${current}\` |
          | Upstream | \`${latest}\` |

          Update checklist for \`Casks/${name}.rb\`:

          - [ ] Bump \`version\` to \`${latest}\`
          - [ ] Refresh the download URL — the filename embeds an opaque build id
                (timestamp + git hash) that is **not** derivable from the version, so copy
                the exact name from the upstream listing
          - [ ] Recompute \`sha256\` (per-arch where the cask is multi-arch)
          - [ ] \`brew style Casks/${name}.rb && brew audit --cask eventb-rossi/tap/${name}\`

          _Opened automatically by the daily release-tracker workflow._
          EOF
          )"

            echo "Filing issue: $title"
            url="$(gh issue create --title "$title" --label livecheck --body "$body")"
            new="${url##*/}"

            # Supersede older open issues for the same cask (an earlier target version).
            jq -r --arg p "${name}: " '.[] | select(.title | startswith($p)) | .number' <<<"$existing" |
            while read -r num; do
              gh issue close "$num" --comment "Superseded by #${new} (${title})."
            done
          done
